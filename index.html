// ============================================================
function buyFertilizer(type) {
  var basePrice = type === 'small' ? 12 : 50;
  var buys = type === 'small' ? G.fertSmallBuys : G.fertLargeBuys;
  var price = basePrice * Math.pow(2, buys);
  if (G.coins < price) {
    showToast('金币不够哦～（下次购买需 ' + price + ' 金币）');
    return;
  }

  G.coins -= price;
  if (type === 'small') { G.fertilizerSmall++; G.fertSmallBuys++; }
  else { G.fertilizerLarge++; G.fertLargeBuys++; }

  var nextPrice = basePrice * Math.pow(2, type === 'small' ? G.fertSmallBuys : G.fertLargeBuys);
  showToast('🧪 已购买' + (type==='small'?'小':'大') + '肥料 (下次 ' + nextPrice + '💰)');
  saveGame();
  updateUI();
}

function useFertilizer(type) {
  var flower = getCurrentFlower();
  if (!flower) { showToast('请先种一朵花～'); return; }

  if (type === 'small' && G.fertilizerSmall <= 0) { showToast('没有小肥料了，去购买吧～'); return; }
  if (type === 'large' && G.fertilizerLarge <= 0) { showToast('没有大肥料了，去购买吧～'); return; }

  var reduction = type === 'small' ? 0.15 : 0.40;
  var maxReduction = flower.clicks - G.currentProgress;
  var reductionAmount = Math.min(Math.floor(flower.clicks * reduction), maxReduction);

  if (reductionAmount <= 0) { showToast('花朵已经快开啦，不需要肥料了～'); return; }

  if (type === 'small') G.fertilizerSmall--; else G.fertilizerLarge--;
  G.currentProgress += reductionAmount;
  showToast('🧪 使用肥料，进度 +' + reductionAmount);

  if (G.currentProgress >= flower.clicks) {
    G.currentProgress = flower.clicks;
    bloomFlower();
  }

  closeModal('fert-shop-modal');
  saveGame();
  updateUI();
}

function shareFlower() {
  // 关闭所有弹窗，确保分享面板不被遮挡
  closeAllModals();

  if (G.dailyData.shareCount >= 3) { showToast('今日分享次数已用完～'); return; }

  var shareText = '🌸 我在「花语花园」养花，快来一起玩吧！🌱';
  var flower = getCurrentFlower();
  if (flower) {
    shareText = '🌸 我在「花语花园」种了一朵' + flower.emoji + flower.name + '！快来一起养花吧～ 🌱';
  }

  function applyShareReward() {
    G.dailyData.shareCount++;
    G.coins += 500;
    showToast('📤 分享成功！+500💰（今日' + G.dailyData.shareCount + '/3）');
    if (!G.dailyData.tasks.share1 && G.dailyData.shareCount >= 1) {
      G.dailyData.tasks.share1 = true;
      G.coins += 5;
      showToast('✅ 完成每日任务：分享1次 +5💰');
    }
    saveGame();
    updateUI();
  }

  // Try Web Share API (supports WeChat on mobile — triggers native share panel with WeChat friends)
  if (navigator.share) {
    navigator.share({
      title: '花语花园 🌸',
      text: shareText,
      url: 'https://stt685.github.io/flower-garden/',
    }).then(function() {
      applyShareReward();
    }).catch(function(err) {
      // User cancelled or share failed — still give reward for trying
      applyShareReward();
    });
  } else {
    // Fallback: copy invite text + link to clipboard
    var fullText = shareText + '\nhttps://stt685.github.io/flower-garden/';
    if (navigator.clipboard && navigator.clipboard.writeText) {
      navigator.clipboard.writeText(fullText).then(function() {
        showToast('📋 邀请语和链接已复制，去微信粘贴发给好友吧！');
        applyShareReward();
      }).catch(function() {
        applyShareReward();
      });
    } else {
      applyShareReward();
    }
  }
}

function watchAd() {
  const flower = getCurrentFlower();
  if (!flower) return;
  if (flower.rarity < 2) return;
  if (G.currentProgress < flower.clicks * 0.3) return;
  if (G.dailyData.adCount >= 2) { showToast('今日广告次数已用完，明天再来吧～'); return; }
  const totalAds = G.dailyData.adCount + (G.dailyData.seedAdDone ? 1 : 0);
  if (totalAds >= 5) { showToast('今日广告次数已用完，明天再来吧～'); return; }
  if (G.totalReductionUsed >= 50) { showToast('单朵花减免已达上限50%'); return; }

  showRewardedAd((success) => {
    if (!success) return;
    G.dailyData.adCount++;
    G.adCooldown = Date.now() + 60000;

    const reduction = Math.floor(flower.clicks * 0.30);
    const remainingReduction = Math.floor(flower.clicks * 0.50) - Math.floor(flower.clicks * G.totalReductionUsed / 100);
    const actualReduction = Math.min(reduction, remainingReduction, flower.clicks - G.currentProgress);

    G.currentProgress += actualReduction;
    G.totalReductionUsed += 30;

    showToast('📺 视频加速完成！进度 +' + actualReduction);

    if (G.currentProgress >= flower.clicks) {
      G.currentProgress = flower.clicks;
      bloomFlower();
    }

    saveGame();
    updateUI();
  });
}

function watchSeedAd() {
  const totalAds = G.dailyData.adCount + (G.dailyData.seedAdDone ? 1 : 0);
  if (totalAds >= 5) { showToast('今日广告次数已用完，明天再来吧～'); return; }
  if (G.dailyData.seedAdDone) { showToast('今日已看视频得种子～'); return; }

    G.dailyData.seedAdDone = true;

    saveGame();
    updateUI();
  });
}

function showTooltip(text, targetId, arrowUp, btnText, btnAction) {
  var tooltip = document.getElementById('tutorial-tooltip');
  var content = document.getElementById('tooltip-text');
  var btn = document.getElementById('tooltip-btn');
  var dim = document.getElementById('tutorial-dim');

  content.textContent = text;
  tooltip.style.display = 'block';
  dim.style.display = 'block';

  if (arrowUp) tooltip.classList.add('arrow-up');
  else tooltip.classList.remove('arrow-up');

  if (btnText) {
    btn.textContent = btnText;
    btn.style.display = 'inline-block';
    btn.onclick = btnAction || dismissTooltip;
  } else {
    btn.style.display = 'none';
  }

  // Position tooltip near target
  var target = document.getElementById(targetId);
  if (target) {
    // Force layout so offsetWidth/Height are correct
    var ttRect = tooltip.getBoundingClientRect();
    var tw = ttRect.width || 260;
    var th = ttRect.height || 100;
    var tRect = target.getBoundingClientRect();
    var left = Math.max(10, Math.min(tRect.left + tRect.width/2 - tw/2, window.innerWidth - tw - 10));
    var top;
    if (arrowUp) {
      top = tRect.bottom + 12;
    } else {
      top = tRect.top - th - 12;
    }
    if (top < 10) { top = tRect.bottom + 12; tooltip.classList.add('arrow-up'); }
    if (top + th > window.innerHeight - 10) {
      top = tRect.top - th - 12;
      tooltip.classList.remove('arrow-up');
    }
    tooltip.style.left = left + 'px';
    tooltip.style.top = top + 'px';
  }
}

function dismissTooltip() {
  var tooltip = document.getElementById('tutorial-tooltip');
  var dim = document.getElementById('tutorial-dim');
  tooltip.style.display = 'none';
  dim.style.display = 'none';
}

function showCelebration(text, duration) {
  var el = document.getElementById('celebration-text');
  el.textContent = text;
  el.style.opacity = '1';
  el.style.animation = 'none';
  void el.offsetWidth;
  el.style.animation = 'celebIn ' + (duration/1000) + 's ease-out forwards';
  setTimeout(function() { el.style.opacity = '0'; }, duration);
}

  document.getElementById('nf-rarity').style.setProperty('--nf-rarity-text', rarityTexts[rarity]);

  // Particles: sparkles + confetti for all rarities, extra for higher
  if (rarity === 3) {
    vibrate(100);
    spawnSparkles(24);
    spawnConfetti(30);
    spawnPetals(20);
  } else if (rarity === 2) {
    spawnSparkles(16);
    spawnConfetti(20);
    spawnPetals(12);
  } else if (rarity === 1) {
    spawnSparkles(10);
    spawnConfetti(14);
    spawnPetals(8);
  } else {
    spawnSparkles(6);
    spawnConfetti(8);
  }

  // Show with animation
  overlay.classList.add('active');
  // Re-trigger card animation
  card.style.animation = 'none';
  void card.offsetWidth;
  card.style.animation = 'popupIn 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) forwards, cardGlowPulse 2s ease-in-out 0.6s infinite';

  // Auto-close
  clearTimeout(nfAutoCloseTimer);
  var autoClose = rarity === 3 ? 3500 : 2500;
  nfAutoCloseTimer = setTimeout(function() { closeNewFlowerPopup(); }, autoClose);
}

function closeNewFlowerPopup() {
  clearTimeout(nfAutoCloseTimer);
  var overlay = document.getElementById('new-flower-overlay');
  if (overlay) overlay.classList.remove('active');
}

// ============================================================
//  BLOOM COLLECTION POPUP — super spectacular version
// ============================================================
var bpAutoCloseTimer = null;

function showBloomPopup(flower, rarity) {
  var overlay = document.getElementById('bloom-popup-overlay');
  if (!overlay) return;

  var rarityNames = ['普通','稀有','史诗','传说'];
  var rarityColors = ['#A8D5BA','#81B5D8','#C9A8D4','#F5D78A'];
  var rarityBgs = ['rgba(168,213,186,0.4)','rgba(129,181,216,0.4)','rgba(201,168,212,0.4)','rgba(245,215,138,0.55)'];
  var rarityTexts = ['#3D7A4F','#3A6D8C','#6B4E7A','#8B6914'];
  var msgs = ['一朵朴实的小花绽放了～','品质不错的花绽放了！','稀世美花绽放了！！','传说中的神花绽放了！！🌟👑'];

  document.getElementById('bp-emoji').textContent = getFlowerEmoji(flower);
  document.getElementById('bp-name').textContent = flower.name;
  document.getElementById('bp-rarity').textContent = '🏵️ ' + rarityNames[rarity];
  document.getElementById('bp-msg').textContent = msgs[rarity];

  // Set rarity colors
  var glow = overlay.querySelector('.bloom-emoji-glow');
  if (glow) glow.style.setProperty('--bp-glow-color', rarityColors[rarity]);
  document.getElementById('bp-rarity').style.setProperty('--bp-rarity-bg', rarityBgs[rarity]);
  document.getElementById('bp-rarity').style.setProperty('--bp-rarity-text', rarityTexts[rarity]);

  // Super particles!
  screenFlash();
  spawnSparkles(35);
  spawnStarBurst(16);
  spawnConfetti(24);
  spawnPetals(26);

  if (rarity === 3) {
    vibrate(120);
    setTimeout(function() { spawnSparkles(20); spawnStarBurst(10); }, 400);
  } else if (rarity === 2) {
    vibrate(60);
    setTimeout(function() { spawnSparkles(12); spawnStarBurst(6); }, 400);
  } else if (rarity === 1) {
    vibrate(30);
  }

  // Show with animation
  overlay.classList.add('active');
  // Re-trigger burst
  var burst = document.getElementById('bloom-burst');
  if (burst) {
    burst.style.animation = 'none';
    void burst.offsetWidth;
    burst.style.animation = 'burstExpand 0.8s ease-out forwards';
  }

  // Auto-close
  clearTimeout(bpAutoCloseTimer);
  var autoClose = rarity === 3 ? 5000 : 4000;
  bpAutoCloseTimer = setTimeout(function() { closeBloomPopup(); }, autoClose);
}

function closeBloomPopup() {
  clearTimeout(bpAutoCloseTimer);
  var overlay = document.getElementById('bloom-popup-overlay');
  if (overlay) overlay.classList.remove('active');
}

// ============================================================
//  BLOOM SETTLEMENT — reward screen after blooming
// ============================================================
var bsAutoCloseTimer = null;

function showBloomSettle(flower, reward) {
  var overlay = document.getElementById('bloom-settle-overlay');
  if (!overlay) return;

  document.getElementById('bs-emoji').textContent = getFlowerEmoji(flower);
  document.getElementById('bs-name').textContent = flower.name;
  document.getElementById('bs-coins').textContent = '+' + reward;

  // Particles for higher rarities
  if (flower.rarity === 3) {
    spawnSparkles(20);
    spawnStarBurst(10);
    vibrate(60);
  } else if (flower.rarity === 2) {
    spawnSparkles(10);
    spawnStarBurst(5);
  } else if (flower.rarity === 1) {
    spawnSparkles(6);
  }

  // Show with animation
  overlay.classList.add('active');

  // Auto-close
  clearTimeout(bsAutoCloseTimer);
  var autoClose = flower.rarity === 3 ? 4000 : 3000;
  bsAutoCloseTimer = setTimeout(function() { closeBloomSettle(); }, autoClose);
}

function closeBloomSettle() {
  clearTimeout(bsAutoCloseTimer);
  var overlay = document.getElementById('bloom-settle-overlay');
  if (overlay) overlay.classList.remove('active');
}

function setBreathGlow(elementId, enable) {
  var el = document.getElementById(elementId);
  if (!el) return;
  if (enable) el.classList.add('breath-glow');
  else el.classList.remove('breath-glow');
}

function setButtonLock(btnId, locked) {
  var btn = document.getElementById(btnId);
  if (!btn) return;
  if (locked) btn.classList.add('locked');
  else btn.classList.remove('locked');
}

function checkLockedTutorial(action) {
  // Never block — buttons are always enabled.
  // Tutorial uses tooltip guidance instead of locking.
  return false;
}

function skipTutorial() {
  if (!confirm('跳过引导后，将直接进入自由模式，需要自己摸索哦～确定吗？')) return;
  G.tutorialProgress = 5;
  G.tutorialPhase = '';
  dismissTooltip();
  unlockAllButtons();
  document.getElementById('celebration-text').style.opacity = '0';
  saveGame();
  updateUI();
  showToast('🎉 进入自由模式！开始你的花园之旅吧～');
}

function unlockAllButtons() {
  setButtonLock('nav-sell-btn', false);
  setButtonLock('nav-seed-btn', false);
  setButtonLock('nav-fert-btn', false);
  setBreathGlow('nav-sell-btn', false);
  setBreathGlow('nav-seed-btn', false);
  setBreathGlow('water-btn', false);
}

// ----- Main tutorial step runner -----
function runTutorialStep(step) {
  dismissTooltip();
  unlockAllButtons();

  if (step === 1) {
    // Step 1: Show initial tooltip pointing to pot
    G.tutorialProgress = 1;
    G.tutorialPhase = 'firstWater';
    setButtonLock('nav-sell-btn', true);
    setButtonLock('nav-seed-btn', true);
    setButtonLock('nav-fert-btn', true);
    showTooltip('🌱 这是一颗蒲公英种子，点击浇水让它发芽吧！', 'pot-container', false, '知道了', function() {
      dismissTooltip();
      setBreathGlow('water-btn', true);
      G.tutorialProgress = 2;
      saveGame();
    });
  }
  else if (step === 4) {
    // Step 4: After bloom, guide to sell
    G.tutorialProgress = 4;
    G.tutorialPhase = 'waitSell';
    setButtonLock('nav-sell-btn', false);
    setButtonLock('nav-seed-btn', true);
    setButtonLock('nav-fert-btn', true);
    setBreathGlow('nav-sell-btn', true);
    showTooltip('💰 这朵花可以卖3金币，卖花才能买新种子哦～', 'nav-sell-btn', true, '卖掉换钱', function() {
      dismissTooltip();
      setBreathGlow('nav-sell-btn', false);
      // Auto-sell for tutorial flow
      sellFlower();
    });
  }
  else if (step === 5) {
    // Step 5: Guide to seed shop
    G.tutorialProgress = 4; // stays 4 until seed is bought
    G.tutorialPhase = 'waitShop';
    setButtonLock('nav-sell-btn', false);
    setButtonLock('nav-seed-btn', false);
    setButtonLock('nav-fert-btn', true);
    setBreathGlow('nav-seed-btn', true);
    showTooltip('🌱 花20金币买一包种子，看看能开出什么吧！', 'nav-seed-btn', true, '去看看', function() {
      dismissTooltip();
      setBreathGlow('nav-seed-btn', false);
      openSeedShop();
    });
  }
  else if (step === 99) {
    // Final end screen
    G.tutorialProgress = 5;
    G.tutorialPhase = '';
    closeAllModals();
    unlockAllButtons();
    showTooltip('🎉 你已经学会了所有玩法！收集全部' + TOTAL + '种花，开始你的花园之旅吧！', 'pot-container', false, '开始种花！', function() {
      dismissTooltip();
      setBreathGlow('water-btn', false);
      saveGame();
      updateUI();
    });
  }
  saveGame();
  updateUI();
}

// ============================================================
//  INITIALIZATION
// ============================================================
function init() {
  loadGame();
  checkDailyReset();

  // If localStorage was empty, try IndexedDB mirror asynchronously
  if (window._needIDBRestore) {
    _idbLoad('main').then(function(idbData) {
      if (idbData) {
        try {
          var saved = JSON.parse(idbData);
          G = Object.assign(JSON.parse(JSON.stringify(DEFAULT_STATE)), saved);
          G.dailyData = Object.assign({ date:'', waterFirstDone:false, dailyWaterCount:0, adCount:0, seedAdDone:false, shareCount:0, tasks:{water3:false,share1:false,sell1:false} }, G.dailyData||{});
          G.dailyData.tasks = Object.assign({ water3:false, share1:false, sell1:false }, (G.dailyData||{}).tasks||{});
          if (typeof G.tutorialPhase === 'undefined') G.tutorialPhase = '';
          delete G.tutorialComplete; delete G.tutorialStep; delete G.firstLegendaryGiven;
          if (G.tutorialProgress === 0) { G.tutorialProgress = 5; G.tutorialPhase = ''; }
          // Also restore to localStorage so future loads find it
          try { localStorage.setItem('flower_garden_v2', JSON.stringify(G)); } catch(e) {}
          checkDailyReset();
          updateUI();
        } catch(e) {}
      }
    });
  }

  // Calculate offline progress
  const offlineDrops = calcOfflineProgress();
  if (offlineDrops > 0 && G.currentFlowerId) {
    document.getElementById('offline-drops').textContent = offlineDrops;
    setTimeout(() => openModal('offline-modal'), 600);
  }

  updateUI();

  // Tutorial check: start tutorial if first time AND no existing progress
  if (G.tutorialProgress === 0 && !G.currentFlowerId && G.coins === 0 && Object.keys(G.collection).length === 0) {
    // Fresh game: start tutorial with dandelion and 17 coins
    G.currentFlowerId = 'dandelion';
    G.currentProgress = 0;
    G.coins = 17;
    G.tutorialProgress = 1;
    G.tutorialPhase = 'firstWater';
    saveGame();
    updateUI();
    setTimeout(function() { runTutorialStep(1); }, 1000);
  } else if (G.tutorialProgress === 0) {
    // Has existing game progress — skip tutorial entirely
    G.tutorialProgress = 5;
    G.tutorialPhase = '';
    saveGame();
    updateUI();
  } else if (G.tutorialProgress < 5) {
    // Resume tutorial from saved state
    updateUI();
    if (G.tutorialProgress === 1 && G.tutorialPhase === 'firstWater') {
      setTimeout(function() { runTutorialStep(1); }, 600);
    } else if (G.tutorialProgress === 2) {
      // Resuming after first tooltip dismissed — re-apply breath glow on water button
      setBreathGlow('water-btn', true);
    } else if (G.tutorialProgress === 4 && G.tutorialPhase === 'waitSell') {
      setTimeout(function() { runTutorialStep(4); }, 600);
    } else if (G.tutorialProgress === 4 && G.tutorialPhase === 'waitShop') {
      setTimeout(function() { runTutorialStep(5); }, 600);
    } else if (G.tutorialProgress === 4 && G.tutorialPhase === 'waitBuy') {
      // Re-show buy tooltip in seed shop
      setTimeout(function() { openSeedShop(); }, 600);
    } else if (G.tutorialProgress === 4 && G.tutorialPhase === 'waitPlant') {
      // Re-show final plant tooltip
      setTimeout(function() {
        showTooltip('🌸 新种子已种下，继续浇水吧！', 'pot-container', false, '知道了', function() {
          dismissTooltip();
          runTutorialStep(99);
        });
      }, 600);
    }
  }

  // Loading screen flower rotation
  var loadingSprout = document.querySelector('.loading-sprout');
  var flowerEmojis = ['🌼','🌸','🌺','🌻','🌷','🪷','🌹','💐','🌾','🪻','💮','🏵️'];
  var flowerIdx = 0;
  var flowerInterval = setInterval(function() {
    loadingSprout.textContent = flowerEmojis[flowerIdx % flowerEmojis.length];
    flowerIdx++;
  }, 400);

  // Hide loading screen
  setTimeout(() => {
    clearInterval(flowerInterval);
    document.getElementById('loading-screen').classList.add('hidden');
    document.getElementById('game-screen').style.display = 'flex';
  }, 2000);

  // Petal spawn interval
  setInterval(() => {
    if (Math.random() < 0.4) spawnPetals(1);
  }, 8000);

  // Collection click
  document.getElementById('coll-progress-text').style.cursor = 'pointer';
}

// Start
init();
</script>
